<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Order Successful</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>
    body {
      background: #f8f9fa;
    }
    .success-card {
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    .success-icon {
      font-size: 70px;
      color: #28a745;
    }
  </style>
</head>
<body>

<div class="container vh-100 d-flex align-items-center justify-content-center">
  <div class="col-md-6">
    <div class="card success-card text-center p-4">
      <div class="card-body">
        <i class="fas fa-check-circle success-icon mb-3"></i>
        <h2 class="fw-bold text-success">Order Placed Successfully!</h2>
        <p class="text-muted mt-2">
          Thank you for your purchase. Your order has been confirmed and will be shipped soon.
        </p>

        <div class="alert alert-light border mt-3">
          <strong>Order ID:</strong> #ORD123456 <br>
          <strong>Payment Mode:</strong> Online Payment
        </div>

        <div class="d-grid gap-2 d-md-flex justify-content-md-center mt-4">
          <a href="login.html" class="btn btn-outline-primary">
            <i class="fas fa-receipt"></i> View Orders
          </a>
          <a href="project.html #products" class="btn btn-success">
            <i class="fas fa-shopping-bag"></i> Continue Shopping
          </a>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
