<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HackerAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        .back {
            position: relative;
            bottom: 80px;
            color: #020202;
        }

        .dd {
            position: relative;
            top: 4.5px;
        }

        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --dark-bg: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%);
        }

        body {
            background: var(--dark-bg);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 420px;
            margin: auto;
        }

        .login-hero {
            background: var(--primary-gradient);
            border-radius: 20px 20px 0 0;
            padding: 2rem;
            color: white;
            text-align: center;
        }

        .form-floating>label {
            color: #6b7280;
            font-weight: 500;
        }

        .form-control {
            border-radius: 12px;
            border: 2px solid #e5e7eb;
            padding: 1rem 1.25rem;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.8);
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.25rem rgba(102, 126, 234, 0.15);
            background: white;
            transform: translateY(-1px);
        }

        .btn-login {
            background: var(--primary-gradient);
            border: none;
            border-radius: 12px;
            padding: 0.875rem 2rem;
            font-weight: 600;
            font-size: 1.1rem;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.4);
        }

        .divider {
            position: relative;
            text-align: center;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e5e7eb;
        }

        .divider span {
            background: rgba(255, 255, 255, 0.95);
            padding: 0 1rem;
            color: #6b7280;
        }

        .social-btn {
            border-radius: 12px;
            padding: 0.75rem 1.5rem;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 2px solid #e5e7eb;
        }

        .social-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }
        .dd{
            text-decoration: none;
        }
    </style>
</head>

<body class="d-flex align-items-center min-vh-100 py-4">
    <div class="container">
        <a href="project.html" class="text-decoration-none category-badge  rr  ">
            <i class="bi bi-arrow-left fs-4 rr dd "></i>
        </a>
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8 col-xl-5">
                <!-- Login Card -->
                <div class="login-card p-4 p-lg-5">

                    <!-- Hero Header -->
                    <div class="login-hero mb-4">
                        <div class="h2 fw-bold mb-2">Welcome Back</div>
                        <p class="mb-0 opacity-90">Sign in to your HackerAI account</p>
                    </div>

                    <!-- Login Form -->
                    <form action="/login" method="POST">
                        <div class="form-floating mb-4">
                            <input type="email" class="form-control" id="email" name="email"
                                placeholder="name@example.com" required>
                            <label for="email">
                                <i class="fas fa-envelope me-2 text-muted"></i>Email Address
                            </label>
                        </div>

                        <div class="form-floating mb-4">
                            <input type="password" class="form-control" id="password" name="password"
                                placeholder="Password" required>
                            <label for="password">
                                <i class="fas fa-lock me-2 text-muted"></i>Password
                            </label>
                        </div>

                        <!-- Remember & Forgot -->
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="remember">
                                <label class="form-check-label small" for="remember">
                                    Remember me
                                </label>
                            </div>
                            <a href="/forgot-password" class="text-decoration-none text-primary fw-medium">Forgot
                                Password?</a>
                        </div>

                        <!-- Login Button -->
                        <button type=" " class="btn btn-primary  w-100 mb-4 text-dark"> <a href="project.html" class="text-dark dd"><h3><i> SIGN IN</h3>
                        </button></a>
                    </form>

                    <!-- Divider -->
                    <a href="project.html">
                        <div class="divider my-4">
                            <span>or continue with</span>
                        </div>
                    </a>

                    <!-- Social Login -->
                    <div class="row g-3 mb-4">
                        <div class="col-6">
                            <a href="/auth/google" class="btn btn-outline-primary social-btn w-100">
                                <i class="fab fa-google me-2"></i>Google
                            </a>
                        </div>
                        <div class="col-6">
                            <a href="/auth/github" class="btn btn-outline-dark social-btn w-100">
                                <i class="fab fa-github me-2"></i>GitHub
                            </a>
                        </div>
                    </div>

                    <!-- Register Link -->
                    <div class="text-center">
                        <span class="text-muted">Don't have an account? </span>
                        <a href="/register" class="text-decoration-none fw-semibold text-primary">Sign up free</a>
                    </div>
                </div>

                <!-- Additional Info -->
                <div class="text-center mt-4 text-white-50">
                    <p class="mb-0 small">
                        <i class="fas fa-shield-alt me-1"></i>
                        Your data is secure and encrypted
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
