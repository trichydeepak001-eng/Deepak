<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
 <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        .back{
            position: relative;
          bottom: 80px;
          color: #020202;
        }
        .dd{
            position: relative;
            top: 4.5px;
        }
        .contact-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 100px 0;
            position: relative;

        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }

        .btn-contact {
            background: linear-gradient(45deg, #667eea, #764ba2);
            border: none;
            padding: 12px 40px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-contact:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .contact-info i {
            font-size: 1.5rem;
            color: #667eea;
        }
        .cont{
             justify-items: center;
        }
    </style>
</head>

<body>
    <!-- Contact Section -->
    <section class="contact-section   ">


        <div class="cont">
            <a href="project.html" class="text-decoration-none category-badge  rr  ">
    <i class="bi bi-arrow-left fs-4 rr dd "></i> 
</a>
            <!-- Contact Info -->
            <div class="col-lg-4 ">
                <div class="card shadow-lg border-0 rounded-4 h-100">
                    <div class="card-body p-5">
                        <h3 class="card-title mb-4 fw-bold text-dark">
                            <i class="fas fa-info-circle me-2 text-primary"></i>Contact Information
                        </h3>

                        <div class="contact-info mb-4">
                            <div class="d-flex align-items-center mb-3">
                                <i class="fas fa-envelope text-primary me-3"></i>
                                <div>
                                    <h6 class="mb-0 fw-semibold">Email Us</h6>
                                    <a href="mailto:hello@company.com"
                                        class="text-muted text-decoration-none">Trichydeepak001@gmail.com</a>
                                </div>
                            </div>
                            <div class="d-flex align-items-center mb-3">
                                <i class="fas fa-phone text-primary me-3"></i>
                                <div>
                                    <h6 class="mb-0 fw-semibold">Call Us</h6>
                                    <a href="tel:+1234567890" class="text-muted text-decoration-none">+91 1223334444</a>
                                </div>
                            </div>
                            <div class="d-flex align-items-center mb-4">
                                <i class="fas fa-map-marker-alt text-primary me-3"></i>
                                <div>
                                    <h6 class="mb-0 fw-semibold">Visit Us</h6>
                                    <p class="text-muted mb-0">123 Business St<br>Business City, BC 12345</p>
                                </div>
                            </div>
                        </div>

                        <!-- Social Links -->
                        <div>
                            <h6 class="fw-semibold mb-3">Follow Us</h6>
                            <div class="d-flex gap-3">
                                <a href="https://share.google/rPbiABBdyXExJANZk" class="btn btn-outline-primary btn-sm rounded-circle">
                                    <i class="fab fa-twitter"></i>
                                </a>
                                <a href="https://share.google/q5DrWeWAEgxqP9Dut" class="btn btn-outline-primary btn-sm rounded-circle">
                                    <i class="fab fa-linkedin"></i>
                                </a>
                                <a href="https://share.google/5czWQzUpqFUQ4Vebl" class="btn btn-outline-primary btn-sm rounded-circle">
                                    <i class="fab fa-facebook"></i>
                                </a>
                                <a href="https://share.google/javdnZ1EOtrk3zKpz" class="btn btn-outline-primary btn-sm rounded-circle">
                                    <i class="fab fa-instagram"></i>

                            </div>
                        </div>

        </div>


    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Form submission handler
        document.getElementById('contactForm').addEventListener('submit', function (e) {
            e.preventDefault();

            // Simulate form submission
            const submitBtn = this.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;

            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Sending...';
            submitBtn.disabled = true;

            // Simulate API call
            setTimeout(() => {
                alert('Thank you for your message! We\'ll get back to you soon.');
                this.reset();
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }, 2000);
        });
    </script>
</body>

</html>
